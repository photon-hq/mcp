services:
  mcp:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      ROUTE_IMESSAGE: "http://imessage:3001"
    depends_on:
      imessage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection({port:3000}).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - dokploy-network

  imessage:
    build:
      context: .
      dockerfile: ./services/imessage/Dockerfile
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection({port:3001}).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
